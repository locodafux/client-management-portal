services:
  - type: web
    name: client-management-portal
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    autoDeploy: true

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: QUEUE_CONNECTION
        value: database

  - type: worker
    name: client-management-queue
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    region: singapore
    plan: free

    envVars:
      - key: APP_ENV
        value: production
      - key: QUEUE_CONNECTION
        value: database