# render.yaml
databases:
  - name: client-management-db
    databaseName: client_management
    user: client_user
    plan: free
    region: singapore

services:
  # Web Service - Free tier (spins down after inactivity)
  - type: web
    name: client-management-portal
    runtime: php
    region: singapore
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: Client Management Portal
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: client-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: client-management-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: client-management-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: client-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: client-management-db
          property: password

  # Cron Job for Queue Processing - Runs every 5 minutes (CHEAPEST!)
  - type: cron
    name: client-management-queue
    runtime: php
    region: singapore
    plan: free
    schedule: "*/5 * * * *"  # Every 5 minutes
    buildCommand: composer install --no-dev --optimize-autoloader
    command: php artisan queue:work --stop-when-empty --tries=3 --max-time=50
    envVars:
      - key: APP_ENV
        value: production
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: client-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: client-management-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: client-management-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: client-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: client-management-db
          property: password